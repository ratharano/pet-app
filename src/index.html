<!DOCTYPE html>
<!--
  Sanctuary Pet — V1 habit tracker with a cozy pet interface.

  Files:
    index.html  → structure (this file)
    style.css   → cozy mobile look
    app.js      → buttons & screens
    state.js    → localStorage save/load
    logic.js    → feed window rules & stats

  The script at the bottom loads app.js as an ES Module.
  app.js imports state.js and logic.js automatically.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ebe4d8" />
  <meta name="description" content="Feed your sanctuary pet on time and watch it grow." />
  <title>Sanctuary Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== Welcome (first launch only) ========== -->
  <p id="loadError" class="load-error" hidden></p>

  <section id="onboarding" class="screen">
    <p class="brand">Sanctuary Pet</p>
    <div class="card card-cozy center">
      <p class="pet-emoji" aria-hidden="true">🥚</p>
      <h1>Your companion awaits</h1>
      <p class="muted">
        Feed them during a daily time window. Stay on schedule to help them grow
        from an egg into something wonderful.
      </p>
      <label class="label" for="petNameInput">Name your pet</label>
      <input
        id="petNameInput"
        class="input"
        type="text"
        maxlength="20"
        placeholder="e.g. Mochi"
        autocomplete="off"
      />
      <p class="hint">Default window: 7:00 AM – 9:00 AM (edit in <code>state.js</code>)</p>
      <button id="startBtn" class="btn btn-primary" type="button">Enter sanctuary</button>
    </div>
  </section>

  <!-- ========== Main screen ========== -->
  <section id="app" class="screen" hidden>
    <header class="header">
      <div>
        <p class="brand-small">Sanctuary</p>
        <h2 id="petNameDisplay">—</h2>
        <span id="stageLabel" class="chip">EGG</span>
      </div>
      <div class="streak-box">
        <span class="label-small">Streak</span>
        <span id="streakCount" class="streak-num">0</span>
      </div>
    </header>

    <div class="pet-stage" aria-hidden="true">
      <span id="petEmoji" class="pet-emoji">🥚</span>
    </div>

    <p id="statusMessage" class="status" role="status" aria-live="polite"></p>

    <div class="card card-cozy">
      <div class="stat">
        <div class="stat-head">
          <span>Health</span>
          <span id="healthValue">0</span>
        </div>
        <div class="bar-track" role="progressbar" aria-label="Health">
          <div id="healthBar" class="bar-fill health"></div>
        </div>
      </div>

      <div class="stat">
        <div class="stat-head">
          <span>Happiness</span>
          <span id="happinessValue">0</span>
        </div>
        <div class="bar-track" role="progressbar" aria-label="Happiness">
          <div id="happinessBar" class="bar-fill happiness"></div>
        </div>
      </div>

      <p class="hint">Today’s feed window: <strong id="windowLabel">—</strong></p>
    </div>

    <button id="feedBtn" class="btn btn-primary btn-wide" type="button">Feed</button>
    <button id="resetBtn" class="btn btn-ghost" type="button">Reset progress</button>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
